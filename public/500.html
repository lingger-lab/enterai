<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>일시적인 오류 - EnterLab</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<style>
  *,*::before,*::after{box-sizing:border-box}
  body{margin:0;font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:linear-gradient(135deg,#fef2f2,#fff7ed);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;word-break:keep-all}
  .card{max-width:32rem;text-align:center;background:#fff;border-radius:1.5rem;padding:2.5rem 2rem;box-shadow:0 10px 30px rgba(220,38,38,.08)}
  .badge{font-size:5rem;font-weight:800;color:#dc2626;line-height:1;letter-spacing:-.05em}
  h1{font-size:1.5rem;color:#111827;margin:1rem 0 .5rem}
  p{color:#6b7280;line-height:1.6;margin:0 0 1.5rem}
  .info{background:#f9fafb;border-radius:.75rem;padding:1rem;font-size:.875rem;color:#4b5563;margin-bottom:1.5rem}
  .btn{display:inline-block;background:#4f46e5;color:#fff;padding:.875rem 1.75rem;border-radius:.75rem;text-decoration:none;font-weight:600;transition:all .2s;margin:.25rem}
  .btn:hover{background:#4338ca;transform:translateY(-1px)}
  .btn-secondary{background:#f3f4f6;color:#374151}
  .btn-secondary:hover{background:#e5e7eb}
</style>
</head>
<body>
<div class="card">
  <div class="badge">!</div>
  <h1>일시적인 오류가 발생했습니다</h1>
  <p>잠시 후 다시 시도해주세요. 문제가 지속되면 아래 연락처로 문의해주세요.</p>
  <div class="info">
    📞 0502-1927-1910<br>
    📧 iamblackwhite86@gmail.com
  </div>
  <a class="btn btn-secondary" href="javascript:location.reload()">다시 시도</a>
  <a class="btn" href="/">홈으로</a>
</div>
</body>
</html>
