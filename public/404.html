<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>페이지를 찾을 수 없습니다 - EnterLab</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<style>
  *,*::before,*::after{box-sizing:border-box}
  body{margin:0;font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:linear-gradient(135deg,#f8fafc,#eef2ff);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;word-break:keep-all}
  .card{max-width:32rem;text-align:center;background:#fff;border-radius:1.5rem;padding:2.5rem 2rem;box-shadow:0 10px 30px rgba(79,70,229,.08)}
  .badge{font-size:7rem;font-weight:800;color:#4f46e5;line-height:1;letter-spacing:-.05em}
  h1{font-size:1.5rem;color:#111827;margin:1rem 0 .5rem}
  p{color:#6b7280;line-height:1.6;margin:0 0 2rem}
  .btn{display:inline-block;background:#4f46e5;color:#fff;padding:.875rem 1.75rem;border-radius:.75rem;text-decoration:none;font-weight:600;transition:all .2s}
  .btn:hover{background:#4338ca;transform:translateY(-1px)}
</style>
</head>
<body>
<div class="card">
  <div class="badge">404</div>
  <h1>페이지를 찾을 수 없습니다</h1>
  <p>요청하신 페이지가 존재하지 않거나 이동되었습니다.<br>홈으로 돌아가서 다시 시도해주세요.</p>
  <a class="btn" href="/">홈으로 돌아가기</a>
</div>
</body>
</html>
