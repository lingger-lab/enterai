name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # CI(test) 통과 후 배포
    needs: []  # 별도 워크플로 (수동 트리거 가능)

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          # 사용자가 GitHub Secrets에 GCP_SA_KEY (서비스 계정 JSON) 추가 후 활성화
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: enterlabs-489809

      - name: Submit Cloud Build
        run: |
          gcloud builds submit \
            --config=cloudbuild.yaml \
            --substitutions=COMMIT_SHA=${{ github.sha }},_SERVICE_NAME=enterlabs-web,_REGION=asia-northeast3 \
            --project=enterlabs-489809
