name: Deploy to Cloud Run (Manual)

# 수동 트리거 전용 (자동 배포는 GCP_SA_KEY secret 추가 후 push 트리거로 변경 가능)
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: enterlabs-489809

      - name: Submit Cloud Build
        run: |
          gcloud builds submit \
            --config=cloudbuild.yaml \
            --substitutions=COMMIT_SHA=${{ github.sha }},_SERVICE_NAME=enterlabs-web,_REGION=asia-northeast3 \
            --project=enterlabs-489809
