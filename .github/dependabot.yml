version: 2
updates:
  # Ruby gem dependencies (security only)
  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ruby"
    # Only security updates to minimize PR noise
    allow:
      - dependency-type: "all"

  # GitHub Actions (when added)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "github-actions"
