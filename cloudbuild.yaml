# Google Cloud Build - Cloud Run 배포 설정
# 프로젝트: enterlabs-489809
# 리전: asia-northeast3 (서울)
#
# 사용법:
#   COMMIT_SHA=$(git rev-parse --short HEAD) && gcloud builds submit --config cloudbuild.yaml --project enterlabs-489809 --substitutions="COMMIT_SHA=$COMMIT_SHA"

substitutions:
  _REGION: asia-northeast3
  _SERVICE_NAME: enterlabs-web

steps:
  # 1. Docker 이미지 빌드
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-northeast3-docker.pkg.dev/enterlabs-489809/enterlab/${_SERVICE_NAME}:$COMMIT_SHA'
      - '-t'
      - 'asia-northeast3-docker.pkg.dev/enterlabs-489809/enterlab/${_SERVICE_NAME}:latest'
      - '.'

  # 2. Artifact Registry에 푸시
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-northeast3-docker.pkg.dev/enterlabs-489809/enterlab/${_SERVICE_NAME}:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-northeast3-docker.pkg.dev/enterlabs-489809/enterlab/${_SERVICE_NAME}:latest']

  # 3. Web 서비스 배포 (update-env-vars로 기존 환경변수 유지)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'services'
      - 'update'
      - '${_SERVICE_NAME}'
      - '--image=asia-northeast3-docker.pkg.dev/enterlabs-489809/enterlab/${_SERVICE_NAME}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--set-env-vars=RAILS_ENV=production,RAILS_LOG_TO_STDOUT=1,RAILS_SERVE_STATIC_FILES=1,SECRET_KEY_BASE=c8d8b5f10519b028fa7303db0ba502ec95201604f986d73dad2bba87f78e1fb27265af8df733a7660daaf4a9d8dffbb71a290f6946f3f00e6f8e9cdd630256b7,DATABASE_HOST=/cloudsql/enterlabs-489809:asia-northeast3:enterlab,DATABASE_USER=postgres,DATABASE_PASSWORD=EnterLab2026!,DATABASE_NAME=enter_ai_production,HOST=enterlab.cloud,ENCRYPTION_KEY=prod_enterlab_enc_key_2026secure,ADMIN_EMAIL=admin@enterlab.com,ADMIN_PHONE=010-5529-1912,CONTACT_PHONE=0502-1927-1910'
      - '--add-cloudsql-instances=enterlabs-489809:asia-northeast3:enterlab'

images:
  - 'asia-northeast3-docker.pkg.dev/enterlabs-489809/enterlab/${_SERVICE_NAME}:$COMMIT_SHA'
  - 'asia-northeast3-docker.pkg.dev/enterlabs-489809/enterlab/${_SERVICE_NAME}:latest'

timeout: '1200s'
